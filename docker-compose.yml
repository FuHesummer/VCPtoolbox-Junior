services:
  app:
    build: .
    container_name: vcptoolbox
    ports:
      - "6005:6005"
      - "6006:6006"
    environment:
      TZ: ${DEFAULT_TIMEZONE:-Asia/Shanghai}
    volumes:
      # Single data/ directory for all persistent state.
      # Entrypoint reads docker-persist.json and symlinks
      # data/ contents into the app directory automatically.
      # First run: image defaults are copied into data/.
      # Container update: plugins get smart-merged (version compare),
      # Agent/TVStxt get new files added, user state is preserved.
      - ./data:/usr/src/app/data
    restart: unless-stopped
