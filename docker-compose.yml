services:
  app:
    build: .
    container_name: vcptoolbox
    ports:
      - "6005:6005"
      - "6006:6006"
    environment:
      TZ: ${DEFAULT_TIMEZONE:-Asia/Shanghai}
    volumes:
      # === Production mode (default) ===
      # Mount config and persistent data only
      - ./config.env:/usr/src/app/config.env
      - ./knowledge:/usr/src/app/knowledge
      - ./thinking:/usr/src/app/thinking
      - ./dailynote:/usr/src/app/dailynote
      - ./image:/usr/src/app/image
      - ./VectorStore:/usr/src/app/VectorStore
      - ./DebugLog:/usr/src/app/DebugLog

      # === Development mode ===
      # Uncomment below to mount entire source (overrides image content)
      # - .:/usr/src/app
      # - /usr/src/app/pydeps
      # - /usr/src/app/node_modules
      # - /usr/src/app/dist

    restart: unless-stopped
