<div id="dailyhot-card-body">
    <p style="color:var(--secondary-text);font-size:0.9em;">加载中...</p>
</div>
<script>
(function() {
    const body = document.getElementById('dailyhot-card-body');
    fetch('/admin_api/dailyhot')
        .then(r => r.ok ? r.json() : Promise.reject('数据未就绪'))
        .then(raw => {
            const items = raw.data || raw;
            let grouped = {};
            if (Array.isArray(items)) {
                for (const it of items) {
                    const src = it.source || '未知';
                    if (!grouped[src]) grouped[src] = [];
                    grouped[src].push(it);
                }
            } else if (typeof items === 'object') {
                grouped = items;
            }
            const sources = Object.keys(grouped);
            if (sources.length === 0) {
                body.innerHTML = '<p style="color:var(--secondary-text);font-size:0.85em;">暂无热榜数据</p>';
                return;
            }
            // Show top 5 from first source
            const firstSrc = sources[0];
            const top5 = (grouped[firstSrc] || []).slice(0, 5);
            let html = `<div style="font-size:0.78em;color:var(--secondary-text);margin-bottom:8px;">${sources.length} 个平台 · ${Object.values(grouped).reduce((a,b)=>a+b.length,0)} 条热点</div>`;
            html += '<div style="display:flex;flex-direction:column;gap:6px;">';
            top5.forEach((item, i) => {
                const title = item.title || item.name || '';
                html += `<div style="display:flex;gap:8px;align-items:baseline;font-size:0.85em;">
                    <span style="color:${i<3?'var(--button-bg)':'var(--secondary-text)'};font-weight:700;min-width:18px;">${i+1}</span>
                    <span style="color:var(--primary-text);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${title.replace(/</g,'&lt;')}</span>
                </div>`;
            });
            html += '</div>';
            body.innerHTML = html;
        })
        .catch(() => {
            body.innerHTML = '<p style="color:var(--secondary-text);font-size:0.85em;">热榜数据未就绪</p>';
        });
})();
</script>
