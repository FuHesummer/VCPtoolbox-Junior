name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.0.0-beta.1)'
        required: true

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: 'stable'

jobs:
  # ================================================================
  # Job 1: SEA 可执行文件构建（4 个平台并行）
  # ================================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            exe: VCPtoolbox.exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            exe: VCPtoolbox
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            exe: VCPtoolbox
          - os: macos-latest
            platform: darwin
            arch: arm64
            exe: VCPtoolbox

    runs-on: ${{ matrix.os }}

    # 统一 shell 为 bash（Windows 使用 Git Bash）
    # 避免 Windows 默认 PowerShell 不认 Unix 语法（如 ls -la、printf）
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Panel repo
        uses: actions/checkout@v4
        with:
          repository: FuHesummer/VCPtoolbox-Junior-Panel
          ref: main
          path: panel

      # 注：不 clone Plugins 仓库 —— 产物只含本体 16 核心，
      # 扩展插件由用户通过 AdminPanel 商店从 GitHub 按需下载（pluginStore.js）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            main/package-lock.json
            panel/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 🚀 Rust 编译缓存（~/.cargo + rust-vexus-lite/target）
      # rust-vexus-lite 冷编译 1-2 分钟，缓存命中后压到 10 秒内
      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            main/rust-vexus-lite/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('main/rust-vexus-lite/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Build Panel (Vue 3 dist)
        working-directory: panel
        run: |
          npm ci
          npm run build
          ls -la dist

      - name: Install main dependencies
        working-directory: main
        run: npm ci

      - name: Build rust-vexus-lite
        working-directory: main/rust-vexus-lite
        run: |
          npm install
          npm run build

      - name: Bundle with esbuild
        working-directory: main
        run: npm run bundle

      - name: Build SEA package
        working-directory: main
        env:
          ADMIN_PANEL_DIST_PATH: ${{ github.workspace }}/panel/dist
        run: node build/package-sea.js ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Smoke test
        shell: bash
        working-directory: main
        run: |
          PKG="dist/vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}"
          EXE="$PKG/${{ matrix.exe }}"
          chmod +x "$EXE" 2>/dev/null || true

          cd "$PKG"
          printf '%s\n' \
            "API_Key=test-key" \
            "API_URL=http://localhost:3000" \
            "PORT=19999" \
            "Key=testkey" \
            "AdminUsername=test" \
            "AdminPassword=test" \
            "EMBEDDING_API_KEY=test" \
            "EMBEDDING_API_URL=http://localhost" \
            "EMBEDDING_MODEL_NAME=test" \
            "VECTORDB_DIMENSION=3072" \
            "DebugMode=false" \
            "KNOWLEDGEBASE_FULL_SCAN_ON_STARTUP=false" \
            > config.env

          "./${{ matrix.exe }}" > startup.log 2>&1 &
          PID=$!

          # Bundle entry 里 adminServer 是 setTimeout(3000) 延迟启动，SEA 产物
          # 数据初始化又需要额外时间；用 wait loop 代替固定 sleep，最多等 60 秒
          echo "⏳ 等 AdminPanel ready (最长 60s)..."
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf -o /dev/null http://localhost:20000/AdminPanel/ 2>/dev/null; then
              echo "   Ready after $((i*2))s"
              break
            fi
          done

          # ===== 验收 1: 主服务启动 =====
          if grep -q "监听端口\|listening\|Plugin discovery\|正在监听" startup.log; then
            echo "✅ Main server started"
          else
            echo "❌ Main server startup failed"
            tail -50 startup.log
            kill -9 $PID 2>/dev/null || true
            exit 1
          fi

          # ===== 验收 2: AdminPanel 可达 =====
          HTTP_CODE=$(curl -o /tmp/panel.html -s -w '%{http_code}' http://localhost:20000/AdminPanel/ || echo "000")
          if [ "$HTTP_CODE" = "200" ] && grep -q "VCP\|vcp" /tmp/panel.html 2>/dev/null; then
            echo "✅ AdminPanel 可访问 (HTTP $HTTP_CODE)"
          else
            echo "❌ AdminPanel 不可达 (HTTP $HTTP_CODE)"
            echo "--- panel.html head ---"
            head -20 /tmp/panel.html 2>/dev/null || echo "(no response)"
            echo "--- adminServer / Combined / PanelUpdater 相关日志 ---"
            grep -iE "admin|combined|panel|listen" startup.log || echo "(无 admin 相关输出 — adminServer 可能完全没起)"
            echo ""
            echo "--- startup.log 完整内容 ---"
            cat startup.log
            kill -9 $PID 2>/dev/null || true
            exit 1
          fi

          # ===== 验收 3: 占位符识别系统 + 16 核心插件 =====
          REG_CODE=$(curl -o /tmp/registry.json -s -w '%{http_code}' \
            -u test:test \
            http://localhost:20000/admin_api/placeholder-registry || echo "000")
          if [ "$REG_CODE" = "200" ] && grep -q "plugins\|placeholders" /tmp/registry.json 2>/dev/null; then
            echo "✅ Placeholder registry 可达（16 核心插件 + 占位符系统启动正常）"
          else
            echo "⚠️  Placeholder registry 检查失败 (HTTP $REG_CODE)"
            head -30 /tmp/registry.json 2>/dev/null || echo "(no response)"
            # 非硬失败：registry 需要 plugins 仓库 sibling 或远程 GitHub 可达
            # 打包产物不含 sibling repo，远程可能被防火墙挡，这里只 warn
          fi

          kill -9 $PID 2>/dev/null || true
          sleep 1
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}
          path: main/dist/vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}.*
          if-no-files-found: error

  # ================================================================
  # Job 2: GitHub Release 发布
  # ================================================================
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vcp-junior-*

      - name: Determine version + prerelease flag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # semver 风格 tag 含 '-' 视为 prerelease（如 v2.0.0-beta.1 / v2.0.0-rc.1）
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "是 Prerelease (含 '-'): $TAG"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "是 Stable Release: $TAG"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "VCPtoolbox-Junior ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          body: |
            ## 🎉 本版本亮点

            - 🔌 **16 个内置核心插件**（新增 FileOperator 文件操作器、EmojiListGenerator 表情包管理器、ImageServer 图床服务）
            - 🎯 **占位符识别闭环**：PromptEditor 三态 chip（✅ ok / ⚠️ 需装 / ❌ 未知）+ 一键装缺失插件
            - 🖼️ **表情包可视化管理**：拖拽上传、分页、搜索、重新生成清单
            - 🔧 **TVS 工具指南协议 v2.1**：插件自带 tvs/*.txt 工具使用指南，安装即注入
            - 🧬 **envContributions 协议**：插件动态贡献 config.env 字段，卸载自动清理
            - 🏗️ **三仓库解耦架构**：本体 + Panel + Plugins 独立迭代
            - 🛫 **上游迁移向导**：从 lioensky/VCPToolBox 一键迁移用户数据

            ## 📦 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `vcp-junior-win32-x64.zip` | 解压后运行 `VCPtoolbox.exe` |
            | Linux x64 | `vcp-junior-linux-x64.tar.gz` | 解压后 `chmod +x VCPtoolbox && ./VCPtoolbox` |
            | Linux ARM64 | `vcp-junior-linux-arm64.tar.gz` | 树莓派 / AWS Graviton / ARM 服务器 |
            | macOS ARM64 (Apple Silicon) | `vcp-junior-darwin-arm64.tar.gz` | M1/M2/M3/M4 |
            | Docker | `ghcr.io` | linux/amd64，见下方 |

            > 注：未提供 macOS x64（Intel Mac）产物 — GitHub Actions 已弃用 macos-13 runner。Intel Mac 用户可从源码构建（`git clone` + `npm run package:mac`）。

            ## 🚀 首次使用

            1. 解压下载的包（或拉取 Docker 镜像）
            2. 复制 `config.env.example` → `config.env`，填入 API 密钥 + `Key` + `Image_Key`
            3. 运行可执行文件：主服务 (6005) + 管理面板 (6006) 同时启动
            4. 打开 `http://localhost:6006/AdminPanel/` 进入管理面板
            5. **装扩展插件**：在 AdminPanel → **插件商店** 从 GitHub 仓库按需下载安装
               （如 WeatherReporter 天气、TavilySearch 搜索、ComfyUIGen 绘图、VCPForum 论坛等）
            6. （可选）在 AdminPanel → 迁移向导从上游 VCPToolBox 迁移老数据

            > **本体开箱即用 16 核心插件**（文件操作、日记系统、RAG 语义检索、占位符识别、
            > 表情包管理、图床、向量索引等），其余都通过商店按需扩展，保持包体积精简。

            ## 🐳 Docker 部署（linux/amd64 原生高性能）

            ```bash
            docker pull ghcr.io/fuhesummer/vcptoolbox-junior:latest
            mkdir -p data
            docker run -d -p 6005:6005 -p 6006:6006 \
              -v ./data:/usr/src/app/data \
              ghcr.io/fuhesummer/vcptoolbox-junior:latest
            ```

            > 所有用户数据（插件、知识库、日记、向量索引、配置）自动持久化到 `data/` 目录。
            > 首次启动从镜像同步默认配置；更新镜像时智能合并新插件，保留用户设置。

            ## ⚠️ Beta 版本提醒

            当前版本含大量架构改动（v1 → v2 三仓库解耦），欢迎反馈 bug 到 [Issues](https://github.com/FuHesummer/VCPtoolbox-Junior/issues)。
          draft: false
          # beta 版仍视为 latest（宝宝决策：未发给用户时 latest=最新 beta）
          # 这样用户看 Releases 页面 + GitHub API /latest 都能拿到最新
          prerelease: false
          make_latest: true
          files: |
            artifacts/**/*

  # ================================================================
  # Job 3: Docker 多架构镜像（amd64 + arm64）
  # ================================================================
  docker:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout Panel repo
        uses: actions/checkout@v4
        with:
          repository: FuHesummer/VCPtoolbox-Junior-Panel
          ref: main
          path: panel

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: Build Panel (Vue 3 dist)
        working-directory: panel
        run: |
          npm ci
          npm run build

      # 方案 C 解耦后本体不带 AdminPanel/，Dockerfile 依赖此目录；
      # 此处把 Panel 仓库 build 产物注入到本体 AdminPanel/ 作为 docker build context
      - name: Inject Panel dist into main/AdminPanel
        run: |
          cp -r panel/dist main/AdminPanel
          ls -la main/AdminPanel | head -5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version + tag strategy
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          # Beta 测试期仍覆盖 :latest（宝宝决策：没发给用户前 latest 就是最新 beta）
          # 正式版发布后可改为"仅正式版覆盖 latest"
          echo "PUSH_LATEST=true" >> $GITHUB_OUTPUT

      - name: Lowercase owner
        id: owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU (ARM cross-compile)
        uses: docker/setup-qemu-action@v3

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: main
          file: main/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.OWNER }}/vcptoolbox-junior:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.owner.outputs.OWNER }}/vcptoolbox-junior:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
