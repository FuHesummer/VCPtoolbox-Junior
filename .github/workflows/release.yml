name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: 'stable'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            exe: VCPtoolbox.exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            exe: VCPtoolbox
          - os: macos-latest
            platform: darwin
            arch: arm64
            exe: VCPtoolbox

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build rust-vexus-lite
        working-directory: rust-vexus-lite
        run: |
          npm install
          npm run build

      - name: Bundle with esbuild
        run: npm run bundle

      - name: Build SEA package
        run: node build/package-sea.js ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Smoke test
        shell: bash
        run: |
          PKG="dist/vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}"
          EXE="$PKG/${{ matrix.exe }}"
          chmod +x "$EXE" 2>/dev/null || true

          cd "$PKG"
          printf '%s\n' \
            "API_Key=test-key" \
            "API_URL=http://localhost:3000" \
            "PORT=19999" \
            "Key=testkey" \
            "AdminUsername=test" \
            "AdminPassword=test" \
            "EMBEDDING_API_KEY=test" \
            "EMBEDDING_API_URL=http://localhost" \
            "EMBEDDING_MODEL_NAME=test" \
            "VECTORDB_DIMENSION=3072" \
            "DebugMode=false" \
            "PANEL_RELEASE_URL=disabled" \
            "KNOWLEDGEBASE_FULL_SCAN_ON_STARTUP=false" \
            > config.env

          "./${{ matrix.exe }}" > startup.log 2>&1 &
          PID=$!
          sleep 12
          kill $PID 2>/dev/null || true
          sleep 1
          kill -9 $PID 2>/dev/null || true

          if grep -q "监听端口\|listening\|Plugin discovery\|正在监听" startup.log; then
            echo "✅ Smoke test passed"
          else
            echo "❌ Startup failed"
            cat startup.log
            exit 1
          fi
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}.*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vcp-junior-*

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "VCPtoolbox-Junior ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          body: |
            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `vcp-junior-win32-x64.zip` | 解压后运行 `VCPtoolbox.exe` |
            | Linux x64 | `vcp-junior-linux-x64.tar.gz` | 解压后 `chmod +x VCPtoolbox && ./VCPtoolbox` |
            | macOS ARM64 | `vcp-junior-darwin-arm64.tar.gz` | 同上 |
            | Docker | `ghcr.io` | 见下方 Docker 部署 |

            ## 首次使用

            1. 解压下载的包
            2. 复制 `config.env.example` → `config.env`，填入 API 密钥
            3. 运行可执行文件，主服务 (6005) + 管理面板 (6006) 同时启动
            4. 打开 `http://localhost:6006/AdminPanel/` 进入管理面板

            ## Docker 部署

            ```bash
            docker pull ghcr.io/fuhesummer/vcptoolbox-junior:latest
            docker run -d -p 6005:6005 -p 6006:6006 \
              -v ./config.env:/usr/src/app/config.env \
              ghcr.io/fuhesummer/vcptoolbox-junior:latest
            ```
          draft: false
          prerelease: false
          files: |
            artifacts/**/*

  docker:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Lowercase owner
        id: owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.OWNER }}/vcptoolbox-junior:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.owner.outputs.OWNER }}/vcptoolbox-junior:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
