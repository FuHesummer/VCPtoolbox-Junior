name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.context/**'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.context/**'
      - 'LICENSE'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: 'stable'

jobs:
  # ===== SEA Build + Smoke Test (3 platforms) =====
  sea-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            exe: VCPtoolbox.exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            exe: VCPtoolbox
          - os: macos-latest
            platform: darwin
            arch: arm64
            exe: VCPtoolbox

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build rust-vexus-lite
        working-directory: rust-vexus-lite
        run: |
          npm install
          npm run build

      - name: Bundle with esbuild
        run: npm run bundle

      - name: Verify bundle
        shell: bash
        run: |
          test -f dist/vcp.bundle.js && echo "✅ Bundle created"
          SIZE=$(wc -c < dist/vcp.bundle.js)
          echo "   Size: $((SIZE / 1024 / 1024)) MB"

      - name: Build SEA package
        run: node build/package-sea.js ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Verify structure
        shell: bash
        run: |
          PKG="dist/vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}"
          test -f "$PKG/${{ matrix.exe }}" && echo "✅ Executable" || exit 1
          find "$PKG/node_modules" -name "*.node" 2>/dev/null | head -5 | while read f; do echo "✅ Native: $f"; done
          for dir in AdminPanel Agent Plugin modules routes; do
            test -d "$PKG/$dir" && echo "✅ $dir/" || echo "⚠️  $dir/ missing"
          done

      - name: Smoke test - startup
        shell: bash
        run: |
          PKG="dist/vcp-junior-${{ matrix.platform }}-${{ matrix.arch }}"
          EXE="$PKG/${{ matrix.exe }}"
          chmod +x "$EXE" 2>/dev/null || true

          cd "$PKG"
          printf '%s\n' \
            "API_Key=test-key" \
            "API_URL=http://localhost:3000" \
            "PORT=19999" \
            "Key=testkey" \
            "AdminUsername=test" \
            "AdminPassword=test" \
            "EMBEDDING_API_KEY=test" \
            "EMBEDDING_API_URL=http://localhost" \
            "EMBEDDING_MODEL_NAME=test" \
            "VECTORDB_DIMENSION=3072" \
            "DebugMode=false" \
            "PANEL_RELEASE_URL=disabled" \
            "KNOWLEDGEBASE_FULL_SCAN_ON_STARTUP=false" \
            > config.env

          echo "=== Starting ${{ matrix.exe }} ==="
          "./${{ matrix.exe }}" > startup.log 2>&1 &
          PID=$!
          sleep 12
          kill $PID 2>/dev/null || true
          sleep 1
          kill -9 $PID 2>/dev/null || true

          echo "=== Startup log ==="
          cat startup.log

          if grep -q "监听端口\|listening\|Plugin discovery\|正在监听" startup.log; then
            echo "✅ Server started OK"
          else
            echo "❌ Startup messages not found"
            exit 1
          fi
          cd -

  # ===== Docker Build + Smoke Test =====
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vcptoolbox-junior:test
          load: true

      - name: Inspect image
        run: |
          docker images vcptoolbox-junior:test --format "{{.Repository}}:{{.Tag}} — {{.Size}}"
          docker run --rm vcptoolbox-junior:test ls -lh vcp.bundle.js
          docker run --rm vcptoolbox-junior:test test -d node_modules && echo "✅ node_modules" || echo "❌ node_modules"
          docker run --rm vcptoolbox-junior:test test -d rust-vexus-lite && echo "✅ rust-vexus-lite" || echo "❌ rust-vexus-lite"

      - name: Smoke test - startup
        run: |
          cat > /tmp/config.env << 'ENVEOF'
          API_Key=test-key
          API_URL=http://localhost:3000
          PORT=19999
          Key=testkey
          AdminUsername=test
          AdminPassword=test
          EMBEDDING_API_KEY=test
          EMBEDDING_API_URL=http://localhost
          EMBEDDING_MODEL_NAME=test
          VECTORDB_DIMENSION=3072
          DebugMode=false
          PANEL_RELEASE_URL=disabled
          KNOWLEDGEBASE_FULL_SCAN_ON_STARTUP=false
          ENVEOF

          docker run -d --name vcp-test \
            -v /tmp/config.env:/usr/src/app/config.env \
            vcptoolbox-junior:test

          echo "=== Waiting for startup (max 30s) ==="
          for i in $(seq 1 30); do
            if docker logs vcp-test 2>&1 | grep -q "正在监听\|listening\|监听端口"; then
              echo "✅ Server started OK (${i}s)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Server did not start"
              docker logs vcp-test 2>&1 | tail -30
              docker rm -f vcp-test
              exit 1
            fi
            sleep 1
          done

          docker rm -f vcp-test
