name: Test Docker Build

on:
  push:
    branches:
      - 'test/sea-packaging'
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/test-docker-build.yml'
      - 'build/**'
      - 'server.js'
      - 'adminServer.js'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vcptoolbox:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image
        run: |
          echo "=== Image size ==="
          docker images vcptoolbox:test --format "{{.Repository}}:{{.Tag}} — {{.Size}}"

          echo ""
          echo "=== Bundle check ==="
          docker run --rm vcptoolbox:test ls -lh dist/vcp.bundle.js

          echo ""
          echo "=== Native modules ==="
          docker run --rm vcptoolbox:test find node_modules -name "*.node" 2>/dev/null || true

          echo ""
          echo "=== Rust vexus ==="
          docker run --rm vcptoolbox:test ls -la rust-vexus-lite/*.node 2>/dev/null || echo "No vexus .node files"

          echo ""
          echo "=== User dirs ==="
          for dir in AdminPanel Agent Plugin TVStxt scripts; do
            docker run --rm vcptoolbox:test test -d "$dir" && echo "✅ $dir/" || echo "❌ $dir/ missing"
          done

      - name: Smoke test - startup
        run: |
          # Create minimal config
          cat > config.env <<'ENVEOF'
          API_Key=test-key
          API_URL=http://localhost:3000
          PORT=19999
          Key=testkey
          AdminUsername=test
          AdminPassword=test
          EMBEDDING_API_KEY=test
          EMBEDDING_API_URL=http://localhost
          EMBEDDING_MODEL_NAME=test
          VECTORDB_DIMENSION=3072
          DebugMode=false
          PANEL_RELEASE_URL=disabled
          KNOWLEDGEBASE_FULL_SCAN_ON_STARTUP=false
          ENVEOF

          # Start container
          docker run -d --name vcp-test \
            -v "$(pwd)/config.env:/usr/src/app/config.env" \
            -p 19999:19999 -p 20000:20000 \
            vcptoolbox:test

          # Wait for startup
          echo "=== Waiting for server startup (max 30s) ==="
          for i in $(seq 1 30); do
            if docker logs vcp-test 2>&1 | grep -q "正在监听\|listening\|监听端口"; then
              echo "✅ Server started OK (${i}s)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Server did not start within 30s"
              echo "=== Container logs ==="
              docker logs vcp-test 2>&1 | tail -50
              docker stop vcp-test 2>/dev/null || true
              docker rm vcp-test 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Show startup logs
          echo ""
          echo "=== Startup logs ==="
          docker logs vcp-test 2>&1 | head -30

          # Check admin panel
          echo ""
          echo "=== Admin panel check ==="
          if docker logs vcp-test 2>&1 | grep -q "管理面板\|AdminServer\|admin.*监听\|admin.*listen"; then
            echo "✅ Admin panel started"
          else
            echo "⚠️  Admin panel startup message not found"
          fi

          # Cleanup
          docker stop vcp-test 2>/dev/null || true
          docker rm vcp-test 2>/dev/null || true
